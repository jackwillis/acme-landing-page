<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Anvil mark (blocky) -->
  <g fill="#8B4513">
    <!-- Base -->
    <rect x="6" y="36" width="34" height="6" rx="1"/>
    <!-- Feet -->
    <rect x="10" y="32" width="6" height="4"/>
    <rect x="30" y="32" width="6" height="4"/>
    <!-- Body -->
    <rect x="14" y="18" width="18" height="14"/>
    <!-- Face (wide top) -->
    <rect x="6" y="12" width="30" height="6" rx="1"/>
    <!-- Horn -->
    <polygon points="36,12 46,12 46,15 36,18"/>
  </g>
  <!-- Wordmark -->
  <text x="54" y="33" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#8B4513">Acme</text>
</svg>
